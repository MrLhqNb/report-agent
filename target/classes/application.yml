server:
  port: 8080
  error:
    include-message: always
    include-exception: true

logging:
  level:
    com.reportagent: DEBUG

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/report-agent;AUTO_SERVER=TRUE;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# AES encryption key for storing passwords
app:
  encrypt-key: ReportAgent@2024#SecretKey!
